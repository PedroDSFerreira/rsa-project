map:
  width_m: 1000
  height_m: 1000
  origin_lat: 40.630
  origin_lng: -8.660
  cell_size_m: 50

entities:
  num_drones: 2
  num_sensors: 5

radio:
  drone_range_m: 150
  base_range_m: 300

simulation:
  tick_real_ms: 500
  drone_speed_m_s: 5.0

base_station:
  lat: 40.630
  lng: -8.660

# Static nodes known at startup — ProximityManager blocks all pairs on init.
# container_name must match the Docker Compose service name used by the Docker SDK.
static_nodes:
  - station_id: 10
    container_name: project-node-a-1
    mac: "6e:06:e0:03:00:0a"
    lat: 40.630
    lng: -8.660
  - station_id: 11
    container_name: project-node-b-1
    mac: "6e:06:e0:03:00:0b"
    lat: 40.634
    lng: -8.660
