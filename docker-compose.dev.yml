services:
  mqtt-central:
    image: eclipse-mosquitto:2
    hostname: mqtt-central
    ports:
      - "${MQTT_EXTERNAL_PORT:-1884}:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - vanetzalan0
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "127.0.0.1", "-p", "1883", "-t", "health", "-m", "1", "-q", "1"]
      interval: 5s
      timeout: 5s
      retries: 5

  base_station:
    build: ./apps/base_station
    container_name: base_station
    cap_add:
      - NET_ADMIN
    environment:
      - MQTT_HOST=${MQTT_HOST:-mqtt-central}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - BASE_STATION_LAT=${BASE_STATION_LAT:-40.630}
      - BASE_STATION_LNG=${BASE_STATION_LNG:--8.660}
      - SIM_AREA_SW_LAT=${SIM_AREA_SW_LAT:-40.630}
      - SIM_AREA_SW_LNG=${SIM_AREA_SW_LNG:--8.660}
      - SIM_AREA_WIDTH_M=${SIM_AREA_WIDTH_M:-1000}
      - SIM_AREA_HEIGHT_M=${SIM_AREA_HEIGHT_M:-1000}
      - CELL_SIZE_M=${CELL_SIZE_M:-50}
      - NUM_DRONES=${NUM_DRONES:-2}
      - CONTAINER_NAME=base_station
      - PYTHONUNBUFFERED=1
    networks:
      - vanetzalan0

  drone:
    build: ./apps/drone
    cap_add:
      - NET_ADMIN
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MQTT_HOST=${MQTT_HOST:-mqtt-central}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - BASE_STATION_LAT=${BASE_STATION_LAT:-40.633}
      - BASE_STATION_LNG=${BASE_STATION_LNG:--8.662}
      - TICK_REAL_MS=${TICK_REAL_MS:-500}
      - DRONE_SPEED_M_S=${DRONE_SPEED_M_S:-5.0}
      - DRONE_COLLECTION_TIME_S=${DRONE_COLLECTION_TIME_S:-3.0}
      - PYTHONUNBUFFERED=1
    networks:
      - vanetzalan0
    deploy:
      replicas: ${NUM_DRONES:-0}

  sensor:
    build: ./apps/sensor
    depends_on:
      mqtt-central:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MQTT_HOST=${MQTT_HOST:-mqtt-central}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - SIM_AREA_SW_LAT=${SIM_AREA_SW_LAT:-40.630}
      - SIM_AREA_SW_LNG=${SIM_AREA_SW_LNG:--8.660}
      - SIM_AREA_WIDTH_M=${SIM_AREA_WIDTH_M:-1000}
      - SIM_AREA_HEIGHT_M=${SIM_AREA_HEIGHT_M:-1000}
      - SIM_RANDOM_SEED=${SIM_RANDOM_SEED:-42}
      - PYTHONUNBUFFERED=1
    networks:
      - vanetzalan0
    deploy:
      replicas: ${NUM_SENSORS:-2}

  proximity-manager:
    build: ./infra/proximity_manager
    depends_on:
      mqtt-central:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
      - MQTT_HOST=${MQTT_HOST:-mqtt-central}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - NUM_SENSORS=${NUM_SENSORS:-2}
      - NUM_DRONES=${NUM_DRONES:-0}
      - SIM_AREA_SW_LAT=${SIM_AREA_SW_LAT:-40.630}
      - SIM_AREA_SW_LNG=${SIM_AREA_SW_LNG:--8.660}
      - SIM_AREA_WIDTH_M=${SIM_AREA_WIDTH_M:-1000}
      - SIM_AREA_HEIGHT_M=${SIM_AREA_HEIGHT_M:-1000}
      - DRONE_RANGE_M=${DRONE_RANGE_M:-150}
      - BASE_RANGE_M=${BASE_RANGE_M:-300}
      - TICK_REAL_MS=${TICK_REAL_MS:-500}
    networks:
      - vanetzalan0

  dashboard-backend:
    build: ./infra/dashboard/backend
    depends_on:
      mqtt-central:
        condition: service_healthy
    environment:
      - MQTT_HOST=${MQTT_HOST:-mqtt-central}
      - MQTT_PORT=${MQTT_PORT:-1883}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - vanetzalan0

  dashboard-frontend:
    build: ./infra/dashboard/frontend
    depends_on:
      - dashboard-backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - vanetzalan0

networks:
  vanetzalan0:
    driver: bridge
