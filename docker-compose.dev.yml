services:
  mqtt-central:
    image: eclipse-mosquitto:2
    hostname: mqtt-central
    ports:
      - "${MQTT_EXTERNAL_PORT:-1884}:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - vanetzalan0

  base_station:
    build: ./apps/base_station
    depends_on:
      - mqtt-central
    cap_add:
      - NET_ADMIN
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MQTT_HOST=${MQTT_HOST:-mqtt-central}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - BASE_STATION_LAT=${BASE_STATION_LAT:-40.630}
      - BASE_STATION_LNG=${BASE_STATION_LNG:--8.660}
      - PYTHONUNBUFFERED=1
    networks:
      - vanetzalan0

  sensor:
    build: ./apps/sensor
    depends_on:
      - mqtt-central
    cap_add:
      - NET_ADMIN
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MQTT_HOST=${MQTT_HOST:-mqtt-central}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - SIM_AREA_SW_LAT=${SIM_AREA_SW_LAT:-40.630}
      - SIM_AREA_SW_LNG=${SIM_AREA_SW_LNG:--8.660}
      - SIM_AREA_WIDTH_M=${SIM_AREA_WIDTH_M:-1000}
      - SIM_AREA_HEIGHT_M=${SIM_AREA_HEIGHT_M:-1000}
      - SIM_RANDOM_SEED=${SIM_RANDOM_SEED:-42}
      - PYTHONUNBUFFERED=1
    networks:
      - vanetzalan0
    deploy:
      replicas: ${NUM_SENSORS:-2}

  proximity-manager:
    build: ./proximity_manager
    depends_on:
      - mqtt-central
    volumes:
      - ./simulation_config.yaml:/config/simulation_config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
      - MQTT_HOST=${MQTT_HOST:-mqtt-central}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - NUM_SENSORS=${NUM_SENSORS:-2}
      - NUM_DRONES=${NUM_DRONES:-0}
      - SIM_AREA_SW_LAT=${SIM_AREA_SW_LAT:-40.630}
      - SIM_AREA_SW_LNG=${SIM_AREA_SW_LNG:--8.660}
      - SIM_AREA_WIDTH_M=${SIM_AREA_WIDTH_M:-1000}
      - SIM_AREA_HEIGHT_M=${SIM_AREA_HEIGHT_M:-1000}
      - BASE_STATION_LAT=${BASE_STATION_LAT:-40.630}
      - BASE_STATION_LNG=${BASE_STATION_LNG:--8.660}
    networks:
      - vanetzalan0

  dashboard-backend:
    build: ./dashboard/backend
    depends_on:
      - mqtt-central
    environment:
      - MQTT_HOST=${MQTT_HOST:-mqtt-central}
      - MQTT_PORT=${MQTT_PORT:-1883}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - vanetzalan0

  dashboard-frontend:
    build: ./dashboard/frontend
    depends_on:
      - dashboard-backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - vanetzalan0

networks:
  vanetzalan0:
    driver: bridge
