services:
  mqtt-central:
    image: eclipse-mosquitto:2
    hostname: mqtt-central
    ports:
      - "1884:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      vanetzalan0:
        ipv4_address: 192.168.98.2

  sensor:
    build: ./apps/sensor
    depends_on:
      - mqtt-central
    cap_add:
      - NET_ADMIN
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MQTT_CENTRAL_HOST=mqtt-central
      - MQTT_CENTRAL_PORT=1883
      - MAP_ORIGIN_LAT=40.630
      - MAP_ORIGIN_LNG=-8.660
      - MAP_WIDTH_M=1000
      - MAP_HEIGHT_M=1000
      - RANDOM_SEED=42
      - PYTHONUNBUFFERED=1
    networks:
      - vanetzalan0
    deploy:
      replicas: 2

  proximity-manager:
    build: ./proximity_manager
    depends_on:
      - mqtt-central
    volumes:
      - ./simulation_config.yaml:/config/simulation_config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
      - MQTT_HOST=mqtt-central
      - MQTT_PORT=1883
    networks:
      vanetzalan0:
        ipv4_address: 192.168.98.3

  dashboard-backend:
    build: ./dashboard/backend
    depends_on:
      - mqtt-central
    environment:
      - MQTT_HOST=mqtt-central
      - MQTT_PORT=1883
    ports:
      - "8000:8000"
    networks:
      vanetzalan0:
        ipv4_address: 192.168.98.4

  dashboard-frontend:
    build: ./dashboard/frontend
    depends_on:
      - dashboard-backend
    ports:
      - "3000:80"
    networks:
      - vanetzalan0

networks:
  vanetzalan0:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.98.0/24
